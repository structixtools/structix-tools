<html lang="en">
<head>

  <style>

      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;

    .button.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent) inset; }
    .file-input { color: var(--muted); }

      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 16px;
      margin-top: 16px;

    .panel {
      background: rgba(17, 26, 51, 0.88);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
    }
    .panel h2, .panel h3 { margin: 0 0 12px; }
    .panel h2 { font-size: 18px; }
    .panel h3 { font-size: 14px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
    }
    .pill.good { color: var(--good); }
    .pill.warn { color: var(--warn); }
    .pill.bad { color: var(--bad); }
    .component-card {
      background: linear-gradient(180deg, rgba(21,31,58,0.95), rgba(17,26,51,0.92));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .component-title { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
    .component-title strong { font-size: 14px; }
    .component-title code { color: var(--accent); }
    .small { font-size: 12px; color: var(--muted); }
    .bars { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .bar {
      min-width: 74px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }
    .bar .num { font-size: 20px; font-weight: 700; }
    .bar .label { font-size: 11px; color: var(--muted); }
    .list { margin: 0; padding-left: 18px; color: var(--text); }
    .list li { margin: 6px 0; }
    .hidden { display: none; }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 14px;
    }
    .table th, .table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    .table th { color: var(--muted); font-weight: 600; }
    .kpi { display:inline-flex; gap: 8px; align-items: center; }
    .swatch { width: 10px; height: 10px; border-radius: 999px; display:inline-block; }
    .risk-high { background: var(--bad); }
    .risk-med { background: var(--warn); }
    .risk-low { background: var(--good); }
    .callout { color: var(--muted); font-size: 13px; }
    .empty { color: var(--muted); border: 1px dashed var(--line); border-radius: 14px; padding: 18px; }
    input[type="file"] { color: var(--muted); }
    code { background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 8px; }
  </style>
</head>

s.boardContext.fillStyle = color;\n        this.boardContext.fillRect(column * cellWidth + 1, row * cellHeight + 1, cellWidth - 2, cellHeight - 2);\n      }\n    }\n  }\n\n  private drawNextPiece(type: PieceType): void {\n    const definition = getPieceDefinition(type);\n    const shape = definition.rotations[0];\n    const { canvas } = this.nextPieceContext;\n    const cellSize = 24;\n    const offsetX = (canvas.width - shape[0].length * cellSize) / 2;\n    const offsetY = (canvas.height - shape.length * cellSize) / 2;\n\n    this.nextPieceContext.clearRect(0, 0, canvas.width, canvas.height);\n    this.nextPieceContext.fillStyle = '#020617';\n    this.nextPieceContext.fillRect(0, 0, canvas.width, canvas.height);\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        this.nextPieceContext.fillStyle = definition.color;\n        this.nextPieceContext.fillRect(offsetX + columnIndex * cellSize, offsetY + rowIndex * cellSize, cellSize - 2, cellSize - 2);\n      });\n    });\n  }\n}","exported":true}],"references":[],"metrics":{"code_lines":64,"comment_lines":0,"blank_lines":0,"cyclomatic_complexity":0},"lexical_hash":12597046144585267725,"token_hash":5201543498947524704,"ast_hash":2315876340469533875},{"path":"samples/tetris-demo/frontend/src/game/engine.ts","language":"TypeScript","symbols":[{"id":"samples/tetris-demo/frontend/src/game/engine.ts::ActivePiece","name":"ActivePiece","kind":"Interface","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":3,"start_column":8,"end_line":8,"end_column":2},"container":null,"signature":"interface ActivePiece {\n  type: PieceType;\n  rotation: number;\n  row: number;\n  column: number;\n}","exported":true},{"id":"samples/tetris-demo/frontend/src/game/engine.ts::GameState","name":"GameState","kind":"Interface","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":10,"start_column":8,"end_line":19,"end_column":2},"container":null,"signature":"interface GameState {\n  board: string[][];\n  currentPiece: ActivePiece | null;\n  nextPieceType: PieceType;\n  score: number;\n  lines: number;\n  level: number;\n  isGameOver: boolean;\n  isPaused: boolean;\n}","exported":true},{"id":"samples/tetris-demo/frontend/src/game/engine.ts::TetrisGame","name":"TetrisGame","kind":"Class","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":21,"start_column":8,"end_line":291,"end_column":2},"container":null,"signature":"class TetrisGame {\n  readonly rows = 20;\n  readonly columns = 10;\n  private dropAccumulator = 0;\n  private readonly stateInternal: GameState;\n\n  constructor() {\n    this.stateInternal = this.createInitialState();\n  }\n\n  get state(): GameState {\n    return {\n      ...this.stateInternal,\n      board: this.stateInternal.board.map((row) => [...row]),\n      currentPiece: this.stateInternal.currentPiece ? { ...this.stateInternal.currentPiece } : null\n    };\n  }\n\n  reset(): void {\n    const fresh = this.createInitialState();\n    this.stateInternal.board = fresh.board;\n    this.stateInternal.currentPiece = fresh.currentPiece;\n    this.stateInternal.nextPieceType = fresh.nextPieceType;\n    this.stateInternal.score = fresh.score;\n    this.stateInternal.lines = fresh.lines;\n    this.stateInternal.level = fresh.level;\n    this.stateInternal.isGameOver = fresh.isGameOver;\n    this.stateInternal.isPaused = fresh.isPaused;\n    this.dropAccumulator = 0;\n    this.spawnNextPiece();\n  }\n\n  update(deltaMs: number): void {\n    if (this.stateInternal.isGameOver || this.stateInternal.isPaused) {\n      return;\n    }\n\n    this.dropAccumulator += deltaMs;\n    if (this.dropAccumulator >= this.getDropInterval()) {\n      this.dropAccumulator = 0;\n      this.stepDown();\n    }\n  }\n\n  togglePause(): void {\n    if (this.stateInternal.isGameOver) {\n      return;\n    }\n    this.stateInternal.isPaused = !this.stateInternal.isPaused;\n  }\n\n  moveLeft(): void {\n    this.tryMove(0, -1);\n  }\n\n  moveRight(): void {\n    this.tryMove(0, 1);\n  }\n\n  softDrop(): void {\n    if (this.stepDown()) {\n      this.stateInternal.score += 1;\n    }\n  }\n\n  hardDrop(): void {\n    if (!this.stateInternal.currentPiece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return;\n    }\n\n    let droppedRows = 0;\n    while (this.tryMove(1, 0)) {\n      droppedRows += 1;\n    }\n\n    this.stateInternal.score += droppedRows * 2;\n    this.lockPiece();\n  }\n\n  rotate(): void {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return;\n    }\n\n    const candidate = { ...piece, rotation: (piece.rotation + 1) % 4 };\n    const kicks = [0, -1, 1, -2, 2];\n\n    for (const kick of kicks) {\n      const shifted = { ...candidate, column: candidate.column + kick };\n      if (!this.collides(shifted)) {\n        this.stateInternal.currentPiece = shifted;\n        return;\n      }\n    }\n  }\n\n  getMergedBoard(): string[][] {\n    const merged = this.stateInternal.board.map((row) => [...row]);\n    const piece = this.stateInternal.currentPiece;\n\n    if (!piece) {\n      return merged;\n    }\n\n    const definition = getPieceDefinition(piece.type);\n    const shape = definition.rotations[piece.rotation];\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        const targetRow = piece.row + rowIndex;\n        const targetColumn = piece.column + columnIndex;\n        if (targetRow >= 0 && targetRow < this.rows && targetColumn >= 0 && targetColumn < this.columns) {\n          merged[targetRow][targetColumn] = definition.color;\n        }\n      });\n    });\n\n    return merged;\n  }\n\n  private createInitialState(): GameState {\n    return {\n      board: Array.from({ length: this.rows }, () => Array.from({ length: this.columns }, () => '')),\n      currentPiece: null,\n      nextPieceType: randomPieceType(),\n      score: 0,\n      lines: 0,\n      level: 1,\n      isGameOver: false,\n      isPaused: false\n    };\n  }\n\n  private getDropInterval(): number {\n    return Math.max(120, 900 - (this.stateInternal.level - 1) * 70);\n  }\n\n  private stepDown(): boolean {\n    if (!this.tryMove(1, 0)) {\n      this.lockPiece();\n      return false;\n    }\n    return true;\n  }\n\n  private tryMove(rowDelta: number, columnDelta: number): boolean {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return false;\n    }\n\n    const candidate: ActivePiece = {\n      ...piece,\n      row: piece.row + rowDelta,\n      column: piece.column + columnDelta\n    };\n\n    if (this.collides(candidate)) {\n      return false;\n    }\n\n    this.stateInternal.currentPiece = candidate;\n    return true;\n  }\n\n  private lockPiece(): void {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece) {\n      return;\n    }\n\n    const definition = getPieceDefinition(piece.type);\n    const shape = definition.rotations[piece.rotation];\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        const boardRow = piece.row + rowIndex;\n        const boardColumn = piece.column + columnIndex;\n        if (boardRow >= 0) {\n          this.stateInternal.board[boardRow][boardColumn] = definition.color;\n        }\n      });\n    });\n\n    this.clearLines();\n    this.spawnNextPiece();\n  }\n\n  private clearLines(): void {\n    const cleared: number[] = [];\n\n    this.stateInternal.board.forEach((row, index) => {\n      if (row.every(Boolean)) {\n        cleared.push(index);\n      }\n    });\n\n    if (cleared.length === 0) {\n      return;\n    }\n\n    for (const rowIndex of cleared.reverse()) {\n      this.stateInternal.board.splice(rowIndex, 1);\n      this.stateInternal.board.unshift(Array.from({ length: this.columns }, () => ''));\n    }\n\n    this.stateInternal.lines += cleared.length;\n    this.stateInternal.level = Math.floor(this.stateInternal.lines / 10) + 1;\n\n    const lineScores = [0, 100, 300, 500, 800];\n    this.stateInternal.score += lineScores[cleared.length] * this.stateInternal.level;\n  }\n\n  private spawnNextPiece(): void {\n    const type = this.stateInternal.nextPieceType;\n    this.stateInternal.nextPieceType = randomPieceType();\n\n    const definition = getPieceDefinition(type);\n    const shape = definition.rotations[0];\n    const spawnColumn = Math.floor((this.columns - shape[0].length) / 2);\n    const spawnPiece: ActivePiece = {\n      type,\n      rotation: 0,\n      row: 0,\n      column: spawnColumn\n    };\n\n    if (this.collides(spawnPiece)) {\n      this.stateInternal.currentPiece = null;\n      this.stateInternal.isGameOver = true;\n      return;\n    }\n\n    this.stateInternal.currentPiece = spawnPiece;\n  }\n\n  private collides(piece: ActivePiece): boolean {\n    const definition = getPieceDefinition(piece.type);\n    const shape: Matrix = definition.rotations[piece.rotation];\n\n    return shape.some((row, rowIndex) =>\n      row.some((cell, columnIndex) => {\n        if (!cell) {\n          return false;\n        }\n\n        const boardRow = piece.row + rowIndex;\n        const boardColumn = piece.column + columnIndex;\n\n        if (boardColumn < 0 || boardColumn >= this.columns || boardRow >= this.rows) {\n          return true;\n        }\n\n        if (boardRow < 0) {\n          return false;\n        }\n\n        return Boolean(this.stateInternal.board[boardRow][boardColumn]);\n      })\n    );\n  }\n}","exported":true}],"refer name":"HighScoreRepository","kind":"Class","file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":7,"start_column":1,"end_line":160,"end_column":2},"container":null,"signature":"public sealed class HighScoreRepository\n{\n    private readonly string _connectionString;\n    private readonly ILogger<HighScoreRepository> _logger;\n\n    public HighScoreRepository(IConfiguration configuration, ILogger<HighScoreRepository> logger)\n    {\n        _connectionString = configuration.GetConnectionString(\"HighScores\")\n            ?? throw new InvalidOperationException(\"Missing connection string 'HighScores'.\");\n        _logger = logger;\n    }\n\n    public async Task EnsureCreatedAsync(CancellationToken cancellationToken = default)\n    {\n        var builder = new SqliteConnectionStringBuilder(_connectionString);\n        var dataSource = builder.DataSource;\n\n        if (!string.IsNullOrWhiteSpace(dataSource))\n        {\n            var fullPath = Path.IsPathRooted(dataSource)\n                ? dataSource\n                : Path.Combine(AppContext.BaseDirectory, dataSource);\n            var directory = Path.GetDirectoryName(fullPath);\n\n            if (!string.IsNullOrWhiteSpace(directory))\n            {\n                Directory.CreateDirectory(directory);\n            }\n        }\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            CREATE TABLE IF NOT EXISTS HighScores (\n                Id INTEGER PRIMARY KEY AUTOINCREMENT,\n                PlayerName TEXT NOT NULL,\n                Score INTEGER NOT NULL,\n                Lines INTEGER NOT NULL,\n                Level INTEGER NOT NULL,\n                CreatedAtUtc TEXT NOT NULL\n            );\n            CREATE INDEX IF NOT EXISTS IX_HighScores_Score ON HighScores (Score DESC, CreatedAtUtc ASC);\n            \"\"\";\n\n        await command.ExecuteNonQueryAsync(cancellationToken);\n        _logger.LogInformation(\"SQLite high score repository initialized.\");\n    }\n\n    public async Task<IReadOnlyList<HighScore>> GetTopScoresAsync(\n        int limit,\n        bool newestFirst = false,\n        CancellationToken cancellationToken = default)\n    {\n        var results = new List<HighScore>();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var orderBy = newestFirst\n            ? \"Score DESC, CreatedAtUtc DESC\"\n            : \"Score DESC, CreatedAtUtc ASC\";\n\n        var command = connection.CreateCommand();\n        command.CommandText = $\"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY {orderBy}\n            LIMIT $limit;\n            \"\"\";\n        command.Parameters.AddWithValue(\"$limit\", limit);\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        while (await reader.ReadAsync(cancellationToken))\n        {\n            results.Add(new HighScore\n            {\n                Id = reader.GetInt64(0),\n                PlayerName = reader.GetString(1),\n                Score = reader.GetInt32(2),\n                Lines = reader.GetInt32(3),\n                Level = reader.GetInt32(4),\n                CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n            });\n        }\n\n        return results;\n    }\n\n    public async Task<HighScore?> GetLatestHighScoreAsync(CancellationToken cancellationToken = default)\n    {\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY CreatedAtUtc DESC\n            LIMIT 1;\n            \"\"\";\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        if (!await reader.ReadAsync(cancellationToken))\n        {\n            return null;\n        }\n\n        return new HighScore\n        {\n            Id = reader.GetInt64(0),\n            PlayerName = reader.GetString(1),\n            Score = reader.GetInt32(2),\n            Lines = reader.GetInt32(3),\n            Level = reader.GetInt32(4),\n            CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n        };\n    }\n\n    public async Task<HighScore> AddAsync(RecordHighScoreRequest request, CancellationToken cancellationToken = default)\n    {\n        var createdAtUtc = DateTime.UtcNow;\n        var normalizedName = request.PlayerName.Trim();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            INSERT INTO HighScores (PlayerName, Score, Lines, Level, CreatedAtUtc)\n            VALUES ($playerName, $score, $lines, $level, $createdAtUtc);\n            SELECT last_insert_rowid();\n            \"\"\";\n        command.Parameters.AddWithValue(\"$playerName\", normalizedName);\n        command.Parameters.AddWithValue(\"$score\", request.Score);\n        command.Parameters.AddWithValue(\"$lines\", request.Lines);\n        command.Parameters.AddWithValue(\"$level\", request.Level);\n        command.Parameters.AddWithValue(\"$createdAtUtc\", createdAtUtc.ToString(\"O\"));\n\n        var id = (long)(await command.ExecuteScalarAsync(cancellationToken)\n            ?? throw new InvalidOperationException(\"Failed to insert high score.\"));\n\n        return new HighScore\n        {\n            Id = id,\n            PlayerName = normalizedName,\n            Score = request.Score,\n            Lines = request.Lines,\n            Level = request.Level,\n            CreatedAtUtc = createdAtUtc\n        };\n    }\n}","exported":true},{"id":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs::HighScoreRepository","name":"HighScoreRepository","kind":"Constructor","file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":12,"start_column":5,"end_line":17,"end_column":6},"container":null,"signature":"public HighScoreRepository(IConfiguration configuration, ILogger<HighScoreRepository> logger)\n    {\n        _connectionString = configuration.GetConnectionString(\"HighScores\")\n            ?? throw new InvalidOperationException(\"Missing connection string 'HighScores'.\");\n        _logger = logger;\n    }","exported":true},{"id":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs::EnsureCreatedAsync","name":"EnsureCreatedAsync","kind":"Method","file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":19,"start_column":5,"end_line":55,"end_column":6},"container":null,"signature":"public async Task EnsureCreatedAsync(CancellationToken cancellationToken = default)\n    {\n        var builder = new SqliteConnectionStringBuilder(_connectionString);\n        var dataSource = builder.DataSource;\n\n        if (!string.IsNullOrWhiteSpace(dataSource))\n        {\n            var fullPath = Path.IsPathRooted(dataSource)\n                ? dataSource\n                : Path.Combine(AppContext.BaseDirectory, dataSource);\n            var directory = Path.GetDirectoryName(fullPath);\n\n            if (!string.IsNullOrWhiteSpace(directory))\n const color = board[row][column];\n        if (!color) {\n          continue;\n        }\n\n        this.boardContext.fillStyle = color;\n        this.boardContext.fillRect(column * cellWidth + 1, row * cellHeight + 1, cellWidth - 2, cellHeight - 2);\n      }\n    }\n  }\n\n  private drawUpcomingPiece(type: PieceType): void {\n    const definition = getPieceDefinition(type);\n    const shape = definition.rotations[0];\n    const { canvas } = this.nextPieceContext;\n    const cellSize = 24;\n    const offsetX = (canvas.width - shape[0].length * cellSize) / 2;\n    const offsetY = (canvas.height - shape.length * cellSize) / 2;\n\n    this.nextPieceContext.clearRect(0, 0, canvas.width, canvas.height);\n    this.nextPieceContext.fillStyle = '#020617';\n    this.nextPieceContext.fillRect(0, 0, canvas.width, canvas.height);\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        this.nextPieceContext.fillStyle = definition.color;\n        this.nextPieceContext.fillRect(offsetX + columnIndex * cellSize, offsetY + rowIndex * cellSize, cellSize - 2, cellSize - 2);\n      });\n    });\n  }\n}","exported":true}],"references":[],"metrics":{"code_lines":64,"comment_lines":0,"blank_lines":0,"cyclomatic_complexity":0},"lexical_hash":15134232383830117829,"token_hash":5201543498947524704,"ast_hash":2315876340469533875},{"path":"samples/tetris-demo/frontend/src/game/engine.ts","language":"TypeScript","symbols":[{"id":"samples/tetris-demo/frontend/src/game/engine.ts::ActivePiece","name":"ActivePiece","kind":"Interface","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":8,"start_column":8,"end_line":13,"end_column":2},"container":null,"signature":"interface ActivePiece {\n  type: PieceType;\n  rotation: number;\n  row: number;\n  column: number;\n}","exported":true},{"id":"samples/tetris-demo/frontend/src/game/engine.ts::GameState","name":"GameState","kind":"Interface","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":15,"start_column":8,"end_line":24,"end_column":2},"container":null,"signature":"interface GameState {\n  board: string[][];\n  currentPiece: ActivePiece | null;\n  nextPieceType: PieceType;\n  score: number;\n  lines: number;\n  level: number;\n  isGameOver: boolean;\n  isPaused: boolean;\n}","exported":true},{"id":"samples/tetris-demo/frontend/src/game/engine.ts::TetrisGame","name":"TetrisGame","kind":"Class","file":"samples/tetris-demo/frontend/src/game/engine.ts","span":{"file":"samples/tetris-demo/frontend/src/game/engine.ts","start_line":26,"start_column":8,"end_line":296,"end_column":2},"container":null,"signature":"class TetrisGame {\n  readonly rows = 20;\n  readonly columns = 10;\n  private dropAccumulator = 0;\n  private readonly stateInternal: GameState;\n\n  constructor() {\n    this.stateInternal = this.createInitialState();\n  }\n\n  get state(): GameState {\n    return {\n      ...this.stateInternal,\n      board: this.stateInternal.board.map((row) => [...row]),\n      currentPiece: this.stateInternal.currentPiece ? { ...this.stateInternal.currentPiece } : null\n    };\n  }\n\n  reset(): void {\n    const fresh = this.createInitialState();\n    this.stateInternal.board = fresh.board;\n    this.stateInternal.currentPiece = fresh.currentPiece;\n    this.stateInternal.nextPieceType = fresh.nextPieceType;\n    this.stateInternal.score = fresh.score;\n    this.stateInternal.lines = fresh.lines;\n    this.stateInternal.level = fresh.level;\n    this.stateInternal.isGameOver = fresh.isGameOver;\n    this.stateInternal.isPaused = fresh.isPaused;\n    this.dropAccumulator = 0;\n    this.spawnNextPiece();\n  }\n\n  update(deltaMs: number, speedMultiplier = 1): void {\n    if (this.stateInternal.isGameOver || this.stateInternal.isPaused) {\n      return;\n    }\n\n    this.dropAccumulator += deltaMs;\n    if (this.dropAccumulator >= this.getDropInterval(speedMultiplier)) {\n      this.dropAccumulator = 0;\n      this.stepDown();\n    }\n  }\n\n  togglePause(): void {\n    if (this.stateInternal.isGameOver) {\n      return;\n    }\n    this.stateInternal.isPaused = !this.stateInternal.isPaused;\n  }\n\n  moveLeft(): void {\n    this.tryMove(0, -1);\n  }\n\n  moveRight(): void {\n    this.tryMove(0, 1);\n  }\n\n  softDrop(): void {\n    if (this.stepDown()) {\n      this.stateInternal.score += calculateSoftDropPoints(1);\n    }\n  }\n\n  hardDrop(): void {\n    if (!this.stateInternal.currentPiece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return;\n    }\n\n    let droppedRows = 0;\n    while (this.tryMove(1, 0)) {\n      droppedRows += 1;\n    }\n\n    this.stateInternal.score += calculateHardDropPoints(droppedRows);\n    this.lockPiece();\n  }\n\n  rotate(): void {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return;\n    }\n\n    const candidate = { ...piece, rotation: (piece.rotation + 1) % 4 };\n    const kicks = [0, -1, 1, -2, 2];\n\n    for (const kick of kicks) {\n      const shifted = { ...candidate, column: candidate.column + kick };\n      if (!this.collides(shifted)) {\n        this.stateInternal.currentPiece = shifted;\n        return;\n      }\n    }\n  }\n\n  getMergedBoard(): string[][] {\n    const merged = this.stateInternal.board.map((row) => [...row]);\n    const piece = this.stateInternal.currentPiece;\n\n    if (!piece) {\n      return merged;\n    }\n\n    const definition = getPieceDefinition(piece.type);\n    const shape = definition.rotations[piece.rotation];\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        const targetRow = piece.row + rowIndex;\n        const targetColumn = piece.column + columnIndex;\n        if (targetRow >= 0 && targetRow < this.rows && targetColumn >= 0 && targetColumn < this.columns) {\n          merged[targetRow][targetColumn] = definition.color;\n        }\n      });\n    });\n\n    return merged;\n  }\n\n  private createInitialState(): GameState {\n    return {\n      board: Array.from({ length: this.rows }, () => Array.from({ length: this.columns }, () => '')),\n      currentPiece: null,\n      nextPieceType: randomPieceType(),\n      score: 0,\n      lines: 0,\n      level: 1,\n      isGameOver: false,\n      isPaused: false\n    };\n  }\n\n  private getDropInterval(speedMultiplier: number): number {\n    const baseInterval = Math.max(120, 900 - (this.stateInternal.level - 1) * 70);\n    const safeMultiplier = speedMultiplier <= 0 ? 1 : speedMultiplier;\n    return Math.max(80, Math.floor(baseInterval / safeMultiplier));\n  }\n\n  private stepDown(): boolean {\n    if (!this.tryMove(1, 0)) {\n      this.lockPiece();\n      return false;\n    }\n    return true;\n  }\n\n  private tryMove(rowDelta: number, columnDelta: number): boolean {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece || this.stateInternal.isPaused || this.stateInternal.isGameOver) {\n      return false;\n    }\n\n    const candidate: ActivePiece = {\n      ...piece,\n      row: piece.row + rowDelta,\n      column: piece.column + columnDelta\n    };\n\n    if (this.collides(candidate)) {\n      return false;\n    }\n\n    this.stateInternal.currentPiece = candidate;\n    return true;\n  }\n\n  private lockPiece(): void {\n    const piece = this.stateInternal.currentPiece;\n    if (!piece) {\n      return;\n    }\n\n    const definition = getPieceDefinition(piece.type);\n    const shape = definition.rotations[piece.rotation];\n\n    shape.forEach((row, rowIndex) => {\n      row.forEach((cell, columnIndex) => {\n        if (!cell) {\n          return;\n        }\n\n        const boardRow = piece.row + rowIndex;\n        const boardColumn = piece.column + columnIndex;\n        if (boardRow >= 0) {\n          this.stateInternal.board[boardRow][boardColumn] = definition.color;\n        }\n      });\n    });\n\n    this.clearLines();\n    this.spawnNextPiece();\n  }\n\n  private clearLines(): void {\n    const cleared: number[] = [];\n\n    this.stateInternal.board.forEach((row, index) => {\n      if (row.every(Boolean)) {\n        cleared.push(index);\n      }\n    });\n\n    if (cleared.length === 0) {\n      return;\n    }\n\n    for (const rowIndex of cleared.reverse()) {\n      this.stateInternal.board.splice(rowIndex, 1);\n      this.stateInternal.board.unshift(Array.from({ length: this.columns }, () => ''));\n    }\n\n    this.stateInternal.lines += cleared.length;\n    this.stateInternal.level = Math.floor(this.stateInternal.lines / 10) + 1;\n    this.stateInternal.score += calculateLineClearPoints(cleared.length, this.stateInternal.level);\n  }\n\n  private spawnNextPiece(): void {\n    const type = this.stateInternal.nextPieceType;\n    this.stateInternal.nextPieceType = randomPieceType();\n\n    const definition = getPieceDefinition(type);\n    const shape = definition.rotations[0];\n    const spawnColumn = Math.floor((this.columns - shape[0].length) / 2);\n    const spawnPiece: ActivePiece = {\n      type,\n      rotation: 0,\n      row: 0,\n      column: spawnColumn\n    };\n\n    if (this.collides(spawnPiece)) {\n      this.stateInternal.currentPiece = null;\n      this.stateInternal.isGameOver = true;\n      return;\n    }\n\n    this.stateInternal.currentPiece = spawnPiece;\n  }\n\n  private collides(piece: ActivePiece): boolean {\n    const definition = getPieceDefinition(piece.type);\n    const shape: Matrix = definition.rotations[piece.rotation];\n\n    return shape.some((row, rowIndex) =>\n      row.some((cell, columnIndex) => {\n        if (!cell) {\n          return false;\n        }\n\n        const boardRow = piece.row + rowIndex;\n        const boardColumn = piece.column + co ration, ILogger<HighScoreRepository> logger)\n    {\n        _connectionString = configuration.GetConnectionString(\"HighScores\")\n            ?? throw new InvalidOperationException(\"Missing connection string 'HighScores'.\");\n        _logger = logger;\n    }\n\n    public async Task EnsureCreatedAsync(CancellationToken cancellationToken = default)\n    {\n        var builder = new SqliteConnectionStringBuilder(_connectionString);\n        var dataSource = builder.DataSource;\n\n        if (!string.IsNullOrWhiteSpace(dataSource))\n        {\n            var fullPath = Path.IsPathRooted(dataSource)\n                ? dataSource\n                : Path.Combine(AppContext.BaseDirectory, dataSource);\n            var directory = Path.GetDirectoryName(fullPath);\n\n            if (!string.IsNullOrWhiteSpace(directory))\n            {\n                Directory.CreateDirectory(directory);\n            }\n        }\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            CREATE TABLE IF NOT EXISTS HighScores (\n                Id INTEGER PRIMARY KEY AUTOINCREMENT,\n                PlayerName TEXT NOT NULL,\n                Score INTEGER NOT NULL,\n                Lines INTEGER NOT NULL,\n                Level INTEGER NOT NULL,\n                CreatedAtUtc TEXT NOT NULL\n            );\n            CREATE INDEX IF NOT EXISTS IX_HighScores_Score ON HighScores (Score DESC, CreatedAtUtc ASC);\n            \"\"\";\n\n        await command.ExecuteNonQueryAsync(cancellationToken);\n        _logger.LogInformation(\"SQLite high score repository initialized.\");\n    }\n\n    public async Task<IReadOnlyList<HighScore>> GetTopScoresAsync(\n        int limit,\n        bool newestFirst = false,\n        CancellationToken cancellationToken = default)\n    {\n        var results = new List<HighScore>();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var orderBy = newestFirst\n            ? \"Score DESC, CreatedAtUtc DESC\"\n            : \"Score DESC, CreatedAtUtc ASC\";\n\n        var command = connection.CreateCommand();\n        command.CommandText = $\"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY {orderBy}\n            LIMIT $limit;\n            \"\"\";\n        command.Parameters.AddWithValue(\"$limit\", limit);\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        while (await reader.ReadAsync(cancellationToken))\n        {\n            results.Add(new HighScore\n            {\n                Id = reader.GetInt64(0),\n                PlayerName = reader.GetString(1),\n                Score = reader.GetInt32(2),\n                Lines = reader.GetInt32(3),\n                Level = reader.GetInt32(4),\n                CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n            });\n        }\n\n        return results;\n    }\n\n    public async Task<HighScore?> GetLatestHighScoreAsync(CancellationToken cancellationToken = default)\n    {\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY CreatedAtUtc DESC\n            LIMIT 1;\n            \"\"\";\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        if (!await reader.ReadAsync(cancellationToken))\n        {\n            return null;\n        }\n\n        return new HighScore\n        {\n            Id = reader.GetInt64(0),\n            PlayerName = reader.GetString(1),\n            Score = reader.GetInt32(2),\n            Lines = reader.GetInt32(3),\n            Level = reader.GetInt32(4),\n            CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n        };\n    }\n\n    public async Task<HighScore> AddAsync(RecordHighScoreRequest request, CancellationToken cancellationToken = default)\n    {\n        var createdAtUtc = DateTime.UtcNow;\n        var normalizedName = request.PlayerName.Trim();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            INSERT INTO HighScores (PlayerName, Score, Lines, Level, CreatedAtUtc)\n            VALUES ($playerName, $score, $lines, $level, $createdAtUtc);\n            SELECT last_insert_rowid();\n            \"\"\";\n        command.Parameters.AddWithValue(\"$playerName\", normalizedName);\n        command.Parameters.AddWithValue(\"$score\", request.Score);\n        command.Parameters.AddWithValue(\"$lines\", request.Lines);\n        command.Parameters.AddWithValue(\"$level\", request.Level);\n        command.Parameters.AddWithValue(\"$createdAtUtc\", createdAtUtc.ToString(\"O\"));\n\n        var id = (long)(await command.ExecuteScalarAsync(cancellationToken)\n            ?? throw new InvalidOperationException(\"Failed to insert high score.\"));\n\n        return new HighScore\n        {\n            Id = id,\n            PlayerName = normalizedName,\n            Score = request.Score,\n            Lines = request.Lines,\n            Level = request.Level,\n            CreatedAtUtc = createdAtUtc\n        };\n    }\n}","before_span":null,"after_span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":7,"start_column":1,"end_line":160,"end_column":2}},{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/Hig \n\n        this.nextPieceContext.fillStyle = definition.color;\n        this.nextPieceContext.fillRect(offsetX + columnIndex * cellSize, offsetY + rowIndex * cellSize, cellSize - 2, cellSize - 2);\n      });\n    });\n  }\n}","after_signature":null,"before_span":{"file":"samples/tetris-demo/frontend/src/game/renderer.ts","start_line":3,"start_column":8,"end_line":64,"end_column":2},"after_span":null}],"api_changes":[{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","qualified_name":"HighScoreRepository","name":"HighScoreRepository","symbol_kind":"Class","kind":"Added","exported":true,"before_signature":null,"after_signature":"public sealed class HighScoreRepository\n{\n    private readonly string _connectionString;\n    private readonly ILogger<HighScoreRepository> _logger;\n\n    public HighScoreRepository(IConfiguration configuration, ILogger<HighScoreRepository> logger)\n    {\n        _connectionString = configuration.GetConnectionString(\"HighScores\")\n            ?? throw new InvalidOperationException(\"Missing connection string 'HighScores'.\");\n        _logger = logger;\n    }\n\n    public async Task EnsureCreatedAsync(CancellationToken cancellationToken = default)\n    {\n        var builder = new SqliteConnectionStringBuilder(_connectionString);\n        var dataSource = builder.DataSource;\n\n        if (!string.IsNullOrWhiteSpace(dataSource))\n        {\n            var fullPath = Path.IsPathRooted(dataSource)\n                ? dataSource\n                : Path.Combine(AppContext.BaseDirectory, dataSource);\n            var directory = Path.GetDirectoryName(fullPath);\n\n            if (!string.IsNullOrWhiteSpace(directory))\n            {\n                Directory.CreateDirectory(directory);\n            }\n        }\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            CREATE TABLE IF NOT EXISTS HighScores (\n                Id INTEGER PRIMARY KEY AUTOINCREMENT,\n                PlayerName TEXT NOT NULL,\n                Score INTEGER NOT NULL,\n                Lines INTEGER NOT NULL,\n                Level INTEGER NOT NULL,\n                CreatedAtUtc TEXT NOT NULL\n            );\n            CREATE INDEX IF NOT EXISTS IX_HighScores_Score ON HighScores (Score DESC, CreatedAtUtc ASC);\n            \"\"\";\n\n        await command.ExecuteNonQueryAsync(cancellationToken);\n        _logger.LogInformation(\"SQLite high score repository initialized.\");\n    }\n\n    public async Task<IReadOnlyList<HighScore>> GetTopScoresAsync(\n        int limit,\n        bool newestFirst = false,\n        CancellationToken cancellationToken = default)\n    {\n        var results = new List<HighScore>();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var orderBy = newestFirst\n            ? \"Score DESC, CreatedAtUtc DESC\"\n            : \"Score DESC, CreatedAtUtc ASC\";\n\n        var command = connection.CreateCommand();\n        command.CommandText = $\"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY {orderBy}\n            LIMIT $limit;\n            \"\"\";\n        command.Parameters.AddWithValue(\"$limit\", limit);\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        while (await reader.ReadAsync(cancellationToken))\n        {\n            results.Add(new HighScore\n            {\n                Id = reader.GetInt64(0),\n                PlayerName = reader.GetString(1),\n                Score = reader.GetInt32(2),\n                Lines = reader.GetInt32(3),\n                Level = reader.GetInt32(4),\n                CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n            });\n        }\n\n        return results;\n    }\n\n    public async Task<HighScore?> GetLatestHighScoreAsync(CancellationToken cancellationToken = default)\n    {\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            SELECT Id, PlayerName, Score, Lines, Level, CreatedAtUtc\n            FROM HighScores\n            ORDER BY CreatedAtUtc DESC\n            LIMIT 1;\n            \"\"\";\n\n        await using var reader = await command.ExecuteReaderAsync(cancellationToken);\n        if (!await reader.ReadAsync(cancellationToken))\n        {\n            return null;\n        }\n\n        return new HighScore\n        {\n            Id = reader.GetInt64(0),\n            PlayerName = reader.GetString(1),\n            Score = reader.GetInt32(2),\n            Lines = reader.GetInt32(3),\n            Level = reader.GetInt32(4),\n            CreatedAtUtc = DateTime.Parse(reader.GetString(5)).ToUniversalTime()\n        };\n    }\n\n    public async Task<HighScore> AddAsync(RecordHighScoreRequest request, CancellationToken cancellationToken = default)\n    {\n        var createdAtUtc = DateTime.UtcNow;\n        var normalizedName = request.PlayerName.Trim();\n\n        await using var connection = new SqliteConnection(_connectionString);\n        await connection.OpenAsync(cancellationToken);\n\n        var command = connection.CreateCommand();\n        command.CommandText = \"\"\"\n            INSERT INTO HighScores (PlayerName, Score, Lines, Level, CreatedAtUtc)\n            VALUES ($playerName, $score, $lines, $level, $createdAtUtc);\n            SELECT last_insert_rowid();\n            \"\"\";\n        command.Parameters.AddWithValue(\"$playerName\", normalizedName);\n        command.Parameters.AddWithValue(\"$score\", request.Score);\n        command.Parameters.AddWithValue(\"$lines\", request.Lines);\n        command.Parameters.AddWithValue(\"$level\", request.Level);\n        command.Parameters.AddWithValue(\"$createdAtUtc\", createdAtUtc.ToString(\"O\"));\n\n        var id = (long)(await command.ExecuteScalarAsync(cancellationToken)\n            ?? throw new InvalidOperationException(\"Failed to insert high score.\"));\n\n        return new HighScore\n        {\n            Id = id,\n            PlayerName = normalizedName,\n            Score = request.Score,\n            Lines = request.Lines,\n            Level = request.Level,\n            CreatedAtUtc = createdAtUtc\n        };\n    }\n}","before_span":null,"after_span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":7,"start_column":1,"end_line":160,"end_column":2}},{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","qualified_name":"HighScoreRepository","name":"HighScoreRepository","symbol_kind":"Constructor","kind":"Added","exported":true,"before_signature":null,"after_signature":"public HighScoreRepository(IConfiguration configuration, ILogger<HighScoreRepository> logger)\n    {\n        _connectionString = configuration.GetConnectionString(\"HighScores\")\n            ?? throw new InvalidOperationException(\"Missing connection string 'HighScores'.\");\n        _logger = logger;\n    }","before_span":null,"after_span":{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","start_line":12,"start_column":5,"end_line":17,"end_column":6}},{"file":"samples/tetris-demo/backend/TetrisDemo.Api/Data/HighScoreRepository.cs","qualified_name":"EnsureCreatedAsync","name":"EnsureCreatedAsync","symbol_kind":"Method","kind":"Added","exported":true,"before_signature":null,"after_signature":"public async Task EnsureCreatedAsync(CancellationToken cancellationToken = default)\n    {\n        var builder = new SqliteConnectionStringBuilder(_connectionString);\n        var dataSource = builder.   <script>
    const initialReport = JSON.parse(document.getElementById('analysis-data').textContent);
    const state = { tab: 'compare', reports: [initialReport] };

    const escapeHtml = (value) => String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');

    function byId(report, side) {
      const items = report[side + '_components'] || [];
      return Object.fromEntries(items.map((item) => [item.id, item]));
    }

    function componentIds(report) {
      const ids = new Set();
      for (const side of ['base', 'head']) {
        for (const item of (report[side + '_components'] || [])) ids.add(item.id);
      }
      return [...ids].sort();
    }

    function renderPills(report) {
      const apiRemoved = (report.findings || []).filter((f) => f.code === 'api.removed').length;
      const apiChanged = (report.findings || []).filter((f) => f.code === 'api.changed').length;
      const cloneDrift = (report.findings || []).filter((f) => f.code === 'clone.drift').length;
      return `
        <div class="stats">
          <span class="pill">${escapeHtml(report.base_ref || 'base')}</span>
          <span class="pill">→</span>
          <span class="pill">${escapeHtml(report.head_ref || 'head')}</span>
          <span class="pill ${apiRemoved ? 'bad' : 'good'}">API removed: ${apiRemoved}</span>
          <span class="pill ${apiChanged ? 'warn' : 'good'}">API changed: ${apiChanged}</span>
          <span class="pill ${cloneDrift ? 'warn' : 'good'}">Clone drift: ${cloneDrift}</span>
        </div>
      `;
    }

    function renderComponentCard(title, component, baseComponent) {
      const delta = baseComponent ? component.file_count - baseComponent.file_count : component.file_count;
      const riskClass = delta > 0 ? 'warn' : delta < 0 ? 'good' : 'good';
      return `
        <div class="component-card" data-component-id="${escapeHtml(component.id)}">
          <div class="component-title">
            <strong><code>${escapeHtml(component.id)}</code></strong>
            <span class="pill ${riskClass}">${delta >= 0 ? '+' : ''}${delta} files</span>
          </div>
          <div class="small">${escapeHtml(title)} · ${component.file_count} files</div>
          <div class="small">${escapeHtml((component.files || []).join(', '))}</div>
        </div>
      `;
    }

    function renderCompare() {
      const report = state.reports[0];
      const base = byId(report, 'base');
      const head = byId(report, 'head');
      const ids = componentIds(report);

      const diffCards = ids.map((id) => renderComponentCard('Component', head[id] || base[id], base[id] || head[id])).join('');

      const findings = (report.findings || []).slice(0, 12).map((finding) => `
        <div class="component-card">
          <div class="component-title">
            <strong>${escapeHtml(finding.title)}</strong>
            <span class="pill">${escapeHtml(finding.code)}</span>
          </div>
          <div class="small">${escapeHtml(finding.detail)}</div>
        </div>
      `).join('');

      document.getElementById('compare-view').innerHTML = `
        <div class="grid">
          <div class="panel">
            <h2>Base</h2>
            <p class="callout">${escapeHtml(report.base_ref || 'base')}</p>
            ${(report.base_components || []).map((component) => renderComponentCard('Base component', component, null)).join('') || '<div class="empty">No base components.</div>'}
          </div>
          <div class="panel">
            <h2>Head</h2>
            <p class="callout">${escapeHtml(report.head_ref || 'head')}</p>
            ${(report.head_components || []).map((component) => renderComponentCard('Head component', component, base[component.id] || null)).join('') || '<div class="empty">No head components.</div>'}
          </div>
          <div class="panel">
            <h2>Findings</h2>
            ${findings || '<div class="empty">No findings.</div>'}
          </div>
        </div>
      `;
    }

    function renderTimeline() {
      const reports = state.reports;
      if (!reports.length) {
        document.getElementById('timeline-view').innerHTML = '<div class="empty">Load one or more JSON reports to see the timeline.</div>';
        return;
      }

      const ids = [...new Set(reports.flatMap((report) => (report.head_components || []).map((component) => component.id)))].sort();
      const headerCells = reports.map((report, index) => `<th>Snapshot ${index + 1}<br><span class="small">${escapeHtml(report.head_ref || 'head')}</span></th>`).join('');
      const rows = ids.map((id) => {
        const cells = reports.map((report) => {
          const component = (report.head_components || []).find((item) => item.id === id);
          if (!component) return '<td class="small">—</td>';
          return `<td><span class="kpi"><span class="swatch ${component.file_count > 1 ? 'risk-med' : 'risk-low'}"></span><code>${escapeHtml(id)}</code></span><br><span class="small">${component.file_count} files</span></td>`;
        }).join('');
        return `<tr><th>${escapeHtml(id)}</th>${cells}</tr>`;
      }).join('');

      document.getElementById('timeline-view').innerHTML = `
        <div class="panel">
          <h2>Timeline</h2>
          <p class="callout">Load multiple report JSON files to compare how components change across snapshots.</p>
          <table class="table">
            <thead><tr><th>Component</th>${headerCells}</tr></thead>
            <tbody>${rows || '<tr><td colspan="2" class="small">No components.</td></tr>'}</tbody>
          </table>
        </div>
      `;
    }

    function renderSummary() {
      const report = state.reports[0];
      document.getElementById('summary-panel').innerHTML = `
        <h3>Current Snapshot</h3>
        <div class="small">${escapeHtml(report.summary || '')}</div>
        ${renderPills(report)}
      `;
      document.getElementById('header-subtitle').textContent = `${report.base_components?.length || 0} base components → ${report.head_components?.length || 0} head components`;
    }

    function render() {
      renderSummary();
      renderCompare();
      renderTimeline();
      document.getElementById('compare-view').classList.toggle('hidden', state.tab !== 'compare');
      document.getElementById('timeline-view').classList.toggle('hidden', state.tab !== 'timeline');
      document.querySelectorAll('[data-tab]').forEach((button) => {
        button.classList.toggle('active', button.dataset.tab === state.tab);
      });
    }

    document.querySelectorAll('[data-tab]').forEach((button) => {
      button.addEventListener('click', () => {
        state.tab = button.dataset.tab;
        render();
      });
    });

    document.getElementById('bundle-input').addEventListener('change', async (event) => {
      const files = [...event.target.files || []];
      const loaded = [];
      for (const file of files) {
        const text = await file.text();
        loaded.push(JSON.parse(text));
      }
      state.reports = [initialReport, ...loaded];
      state.tab = 'timeline';
      render();
    });

    render();
  </script>
